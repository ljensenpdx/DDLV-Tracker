<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDV Universal Character Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: auto;
            max-width: 1350px;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #111;
            text-align: center;
        }
        .reset-btn {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .reset-btn:hover {
            background: #c82333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: left;
            vertical-align: top;
            transition: background-color 0.2s ease;
        }
        th {
            background-color: #007bff;
            color: white;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }
        
        .col-shrink {
            width: 1%;
            white-space: nowrap;
        }
        
        /* Cell containing target elements */
        .lockout-target {
            position: relative; /* Anchor for cell-contained elements */
        }
        
        .char-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            font-size: 14px;
            min-width: 110px;
        }
        .editable-name {
            display: inline-block;
            border-bottom: 1px dashed #ccc;
            padding: 2px 4px;
            outline: none;
            cursor: text;
        }
        .editable-name:focus {
            border-bottom: 1px solid #007bff;
            background-color: #fffdf0;
        }
        .locked-name {
            display: inline-block;
            padding: 2px 4px;
            font-weight: bold;
        }
        .char-thumb {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 6px;
            background-color: #f8f9fa;
            border: 1px solid #e1e4e8;
            margin-top: 6px;
        }
        
        select, input[type="text"] {
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
        }
        
        .trackers-horizontal-container {
            display: flex;
            gap: 12px;
        }
        .tracker-column {
            flex: 1;
            background-color: #fafbfc;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 8px;
            min-width: 220px;
        }
        .search-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
        }
        .search-row input[type="text"] {
            width: 100%;
            flex-grow: 1;
        }
        .checkbox-row {
            display: flex;
            gap: 10px;
            font-size: 11px;
        }
        .checkbox-row label {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        
        .bullet-list {
            margin: 0;
            padding-left: 14px;
        }
        .bullet-list li {
            margin-bottom: 2px;
            font-size: 11px;
        }

        .info-card {
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 11px;
            color: #222;
            line-height: 1.35;
            border: 1px solid transparent;
            margin-top: 6px;
        }
        .info-card.meal { background-color: #fff9db; border-color: #ffe066; }
        .info-card.fish { background-color: #eef7ff; border-color: #bce0ff; }
        .info-card.gem { background-color: #fdf2ff; border-color: #f1c6ff; }
        .info-card.flower { background-color: #fff4f4; border-color: #ffcccc; }
        .info-card.resource { background-color: #f4fff4; border-color: #ccffcc; }
        .info-card.crafting { background-color: #fffdf2; border-color: #ffe6cc; }
        .info-card.ingredient { background-color: #f7f9fa; border-color: #dee2e6; }
        
        /* --- LEVEL 10 BLACKOUT LOOK --- */
        tr.max-level td.lockout-target {
            background-color: #1a1d20 !important;
            color: #1a1d20 !important;
        }
        tr.max-level td.lockout-target * {
            visibility: hidden !important;
        }

        /* --- IMMACULATE LOCKOVERLAY FIX --- */
        /* Individual masks placed directly inside columns C and D */
        .cell-lock-mask {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 5;
            box-sizing: border-box;
        }
        
        /* Centers the lock text snippet inside the rightmost grid split area */
        .cell-lock-mask.centered-content {
            display: none;
            align-items: center;
            justify-content: flex-start;
            padding-left: 40px;
            font-size: 24px;
            font-weight: 600;
            color: #666;
            user-select: none;
        }

        /* Displays overlays exclusively when parent row status hits lock selector values */
        tr.locked-out .cell-lock-mask {
            display: block;
        }
        tr.locked-out .cell-lock-mask.centered-content {
            display: flex;
        }
        tr.locked-out td.lockout-target * {
            visibility: hidden !important;
        }

        .status-msg {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Daily Character Tracker</h1>
    <div class="status-msg" id="statusMsg">Synchronizing universal master items list...</div>
    <button class="reset-btn" onclick="masterReset()">Master Reset All</button>

    <datalist id="universalSuggestions"></datalist>

    <table>
        <thead>
            <tr>
                <th class="col-shrink">Character</th>
                <th class="col-shrink">Level</th>
                <th class="col-shrink">Activity</th>
                <th>Favorite Gift Items (Daily Trackers)</th>
            </tr>
        </thead>
        <tbody id="trackerBody"></tbody>
    </table>
</div>

<script>
    const characters = [
        "Aladdin", "Jafar", "Jasmine", "Alice", "Cheshire Cat", "Belle", "Cogsworth", "Gaston", 
        "Lumiere", "The Beast", "Merida", "Cinderella", "The Fairy Godmother", "The Forgotten", 
        "Mirabel", "Anna", "Elsa", "Kristoff", "Olaf", "Hades", "Hercules", "Phil", "Joy", 
        "Sadness", "Lady", "Tramp", "Stitch", "Daisy", "Donald Duck", "Goofy", "Mickey Mouse", 
        "Minnie Mouse", "Scrooge McDuck", "Maui", "Moana", "Mike Wazowski", "Sulley", "Mulan", 
        "Mushu", "Cruella", "Oswald", "Peter Pan", "Tinker Bell", "Pocahontas", "Remy", "Aurora", 
        "Maleficent", "Snow White", "Flynn", "Mother Gothel", "Rapunzel", "Nala", "Pumbaa", 
        "Scar", "Simba", "Timon", "Ariel", "Prince Eric", "Ursula", "Tiana", "Merlin", 
        "Jack Skellington", "Sally", "Buzz Lightyear", "Woody", "EVE", "WALL-E", "Tigger", "Vanellope"
    ];

    const activities = ["Digging", "Fishing", "Foraging", "Gardening", "Mining", "Snippet Catching", "Timebending"];
    
    const characterImageOverrides = {
        "mickey mouse": "Mickey_Mouse", "minnie mouse": "Minnie_Mouse", "scrooge mcduck": "Scrooge_McDuck",
        "donald duck": "Donald_Duck", "prince eric": "Prince_Eric", "buzz lightyear": "Buzz_Lightyear",
        "the fairy godmother": "The_Fairy_Godmother", "the beast": "The_Beast", "daisy": "Daisy",
        "the forgotten": "The_Forgotten"
    };

    let recipeDatabase = {};
    let materialDatabase = {};
    let globalItemMasterSet = new Set();

    function parseCSVWithMultiLines(text) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let insideQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            let nextChar = text[i + 1];

            if (char === '"') {
                if (insideQuotes && nextChar === '"') {
                    currentField += '"';
                    i++; 
                } else {
                    insideQuotes = !insideQuotes;
                }
            } else if (char === ',' && !insideQuotes) {
                currentRow.push(currentField);
                currentField = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                currentRow.push(currentField);
                if (currentRow.length > 0 && currentRow.some(f => f.trim().length > 0)) {
                    rows.push(currentRow);
                }
                currentRow = [];
                currentField = '';
            } else {
                currentField += char;
            }
        }
        if (currentField || currentRow.length > 0) {
            currentRow.push(currentField);
            rows.push(currentRow);
        }
        return rows;
    }

    function formatToListHtml(text) {
        if (!text) return 'n/a';
        const items = text.split('\n').map(i => i.trim()).filter(i => i.length > 0);
        if (items.length === 0) return 'n/a';
        if (items.length === 1) return items[0];
        return `<ul class="bullet-list">${items.map(item => `<li>${item}</li>`).join('')}</ul>`;
    }

    async function fetchAndRegister(url, type, colIndices) {
        try {
            const response = await fetch(url);
            if (!response.ok) return;
            const text = await response.text();
            const parsedRows = parseCSVWithMultiLines(text);
            
            parsedRows.forEach((columns, index) => {
                if (index === 0 || columns.length <= Math.max(...colIndices)) return;
                const name = columns[colIndices[0]].trim();
                if (!name || name.toLowerCase() === 'name' || name.toLowerCase() === 'category') return;
                
                globalItemMasterSet.add(name);
                materialDatabase[name.toLowerCase()] = {
                    name: name,
                    type: type,
                    field1: columns[colIndices[1]] ? columns[colIndices[1]].trim() : '',
                    field2: columns[colIndices[2]] ? columns[colIndices[2]].trim() : '',
                    field3: columns[colIndices[3]] ? columns[colIndices[3]].trim() : '',
                    field4: columns[colIndices[4]] ? columns[colIndices[4]].trim() : '',
                    field5: columns[colIndices[5]] ? columns[colIndices[5]].trim() : ''
                };
            });
        } catch (e) {
            console.warn(`Optional database file omitted: ${url}`);
        }
    }

    async function initializeUniversalAutofill() {
        await fetchAndRegister('./Fishing.csv', 'fish', [0, 1, 2, 3]);       
        await fetchAndRegister('./Gems.csv', 'gem', [0, 1]);                 
        await fetchAndRegister('./Flowers.csv', 'flower', [0, 2, 1]);          
        await fetchAndRegister('./Resources.csv', 'resource', [0, 1]);       
        await fetchAndRegister('./Crafting.csv', 'crafting', [0, 1]);        
        await fetchAndRegister('./Ingredients.csv', 'ingredient', [0, 1, 2, 4, 5, 6]);

        try {
            const mealResponse = await fetch('./Meals.csv');
            if (mealResponse.ok) {
                const mealText = await mealResponse.text();
                const parsedMealRows = parseCSVWithMultiLines(mealText);
                parsedMealRows.forEach((columns, index) => {
                    if (index === 0 || columns.length < 2) return;
                    const name = columns[0].trim();
                    const ingredientsRaw = columns[1];
                    if (name && ingredientsRaw && name.toLowerCase() !== 'name') {
                        globalItemMasterSet.add(name);
                        recipeDatabase[name.toLowerCase()] = ingredientsRaw.split('\n').map(i => i.trim()).filter(i => i.length > 0);
                    }
                });
            }
        } catch (e) {
            console.warn("Meals file index logic bypassed.");
        }

        const sortedItems = Array.from(globalItemMasterSet).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        const datalist = document.getElementById('universalSuggestions');
        sortedItems.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item;
            datalist.appendChild(opt);
        });

        document.getElementById('statusMsg').textContent = `Cross-linked ${sortedItems.length} options seamlessly across tables.`;
        document.getElementById('statusMsg').style.color = '#28a745';
    }

    function buildTrackerInterface() {
        const tbody = document.getElementById('trackerBody');
        characters.forEach((char, index) => {
            const lowerChar = char.toLowerCase();
            let targetFileName = characterImageOverrides[lowerChar] || char.replace(/\s+/g, '_');
            const directWikiImgUrl = `https://dreamlightvalleywiki.com/Special:FilePath/${targetFileName}.png`;

            let nameHtml = '';
            if (char === "The Forgotten") {
                nameHtml = `<span class="editable-name" contenteditable="true" id="name-${index}" oninput="saveData()">${char}</span>`;
            } else {
                nameHtml = `<span class="locked-name" id="name-${index}">${char}</span>`;
            }

            const row = document.createElement('tr');
            row.id = `row-${index}`;
            row.innerHTML = `
                <td class="col-shrink">
                    <div class="char-cell">
                        ${nameHtml}
                        <img class="char-thumb" src="${directWikiImgUrl}" alt="${char}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'50\' height=\'50\' viewBox=\'0 0 50 50\'><rect width=\'50\' height=\'50\' fill=\'%23f0f2f5\'/><text x=\'50%\' y=\'55%\' font-size=\'12\' fill=\'%23a0a5b0\' font-family=\'sans-serif\' text-anchor=\'middle\'>✨</text></svg>';">
                    </div>
                </td>
                <td class="col-shrink">
                    <select id="lvl-${index}" onchange="evaluateLevelState(${index})">
                        ${[...Array(10).keys()].map(i => `<option value="${i+1}">${i+1}</option>`).join('')}
                        <option value="lock">🔒</option>
                    </select>
                </td>
                
                <!-- Fixed Activity Column: Safe cell-contained overlay mask applied inside -->
                <td class="col-shrink lockout-target">
                    <select id="act-${index}" onchange="saveData()">
                        ${activities.map(a => `<option value="${a}">${a}</option>`).join('')}
                    </select>
                    <div class="cell-lock-mask"></div>
                </td>
                
                <!-- Fixed Gift Item Target: Clear container layout mask applied inside -->
                <td class="lockout-target">
                    <div class="trackers-horizontal-container">
                        ${[1, 2, 3].map(n => `
                            <div class="tracker-column">
                                <div class="search-row">
                                    <input type="text" id="s-${index}-${n}" list="universalSuggestions" placeholder="Item ${n}..." oninput="updateLiveCard(${index}, ${n})">
                                </div>
                                <div class="checkbox-row">
                                    <label><input type="checkbox" id="inv-${index}-${n}" onchange="saveData()"> In Inv</label>
                                    <label><input type="checkbox" id="done-${index}-${n}" onchange="checkDoneStep(${index}, ${n})"> Done</label>
                                </div>
                                <div id="card-${index}-${n}"></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="cell-lock-mask centered-content">
                        <span>🔒 Locked</span>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
        loadSavedData();
    }

    function renderCardContents(itemName) {
        const key = itemName.toLowerCase().trim();
        if (!key) return '';

        if (recipeDatabase[key]) {
            return `<div class="info-card meal"><strong>🍳 Recipe Ingredients:</strong><ul class="bullet-list">${recipeDatabase[key].map(i => `<li>${i}</li>`).join('')}</ul></div>`;
        }

        const mat = materialDatabase[key];
        if (mat) {
            if (mat.type === 'fish') {
                return `<div class="info-card fish"><strong>🎣 Ripple:</strong> ${mat.field1 || 'None'}<br><strong>📍 Locations:</strong> ${formatToListHtml(mat.field2)}</div>`;
            } else if (mat.type === 'gem') {
                return `<div class="info-card gem"><strong>💎 Locations:</strong> ${formatToListHtml(mat.field1)}</div>`;
            } else if (mat.type === 'flower') {
                return `<div class="info-card flower"><strong>🌸 Locations:</strong> ${formatToListHtml(mat.field1)}</div>`;
            } else if (mat.type === 'resource') {
                return `<div class="info-card resource"><strong>📦 Sources:</strong> ${formatToListHtml(mat.field1)}</div>`;
            } else if (mat.type === 'crafting') {
                return `<div class="info-card crafting"><strong>🛠️ Sources:</strong> ${formatToListHtml(mat.field1)}</div>`;
            } else if (mat.type === 'ingredient') {
                return `<div class="info-card ingredient"><strong>🌱 Grow:</strong> ${mat.field2 || 'n/a'}<br><strong>📍 Locations:</strong> ${formatToListHtml(mat.field4)}</div>`;
            }
        }
        return '';
    }

    function evaluateLevelState(charIdx) {
        const lvlBox = document.getElementById(`lvl-${charIdx}`);
        const targetRow = document.getElementById(`row-${charIdx}`);
        
        targetRow.classList.remove('max-level', 'locked-out');
        
        if (lvlBox.value === "10") {
            targetRow.classList.add('max-level');
            clearRowInputs(charIdx);
        } else if (lvlBox.value === "lock") {
            targetRow.classList.add('locked-out');
            clearRowInputs(charIdx);
        }
        saveData();
    }

    function clearRowInputs(charIdx) {
        [1, 2, 3].forEach(n => {
            document.getElementById(`s-${charIdx}-${n}`).value = "";
            document.getElementById(`inv-${charIdx}-${n}`).checked = false;
            document.getElementById(`card-${charIdx}-${n}`).innerHTML = "";
        });
    }

    function updateLiveCard(charIdx, n) {
        const val = document.getElementById(`s-${charIdx}-${n}`).value;
        const cardBox = document.getElementById(`card-${charIdx}-${n}`);
        cardBox.innerHTML = renderCardContents(val);
        saveData();
    }

    function checkDoneStep(charIdx, n) {
        const doneBox = document.getElementById(`done-${charIdx}-${n}`);
        if (doneBox.checked) {
            document.getElementById(`s-${charIdx}-${n}`).value = "";
            document.getElementById(`inv-${charIdx}-${n}`).checked = false;
            document.getElementById(`card-${charIdx}-${n}`).innerHTML = "";
            doneBox.checked = false; 
        }
        saveData();
    }

    function saveData() {
        const dataState = {};
        document.querySelectorAll('select, input').forEach(el => {
            if (el.id) dataState[el.id] = (el.type === 'checkbox' ? el.checked : el.value);
        });
        
        const theForgottenNode = document.querySelector('.editable-name');
        if (theForgottenNode && theForgottenNode.id) {
            dataState[theForgottenNode.id] = theForgottenNode.innerText;
        }
        
        localStorage.setItem('ddvCharacterProgressState', JSON.stringify(dataState));
    }

    function loadSavedData() {
        const dataState = JSON.parse(localStorage.getItem('ddvCharacterProgressState') || "{}");
        Object.keys(dataState).forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                if (el.classList.contains('editable-name')) {
                    el.innerText = dataState[id];
                } else if (el.type === 'checkbox') {
                    el.checked = dataState[id];
                } else {
                    el.value = dataState[id];
                }
            }
        });
        
        characters.forEach((char, index) => {
            const lvlBox = document.getElementById(`lvl-${index}`);
            const targetRow = document.getElementById(`row-${index}`);
            
            if (lvlBox.value === "10") {
                targetRow.classList.add('max-level');
            } else if (lvlBox.value === "lock") {
                targetRow.classList.add('locked-out');
            }
            
            [1, 2, 3].forEach(n => {
                const val = document.getElementById(`s-${index}-${n}`).value;
                if (val && lvlBox.value !== "10" && lvlBox.value !== "lock") {
                    document.getElementById(`card-${index}-${n}`).innerHTML = renderCardContents(val);
                }
            });
        });
    }

    function masterReset() {
        if (confirm("Are you sure you want to run a master reset? This clears all entries back to blank.")) {
            localStorage.removeItem('ddvCharacterProgressState');
            location.reload();
        }
    }

    async function init() {
        buildTrackerInterface();
        await initializeUniversalAutofill();
    }

    init();
</script>
</body>
</html>
