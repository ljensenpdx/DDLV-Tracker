<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDV Universal Character Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 950px;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #111;
            text-align: center;
        }
        .reset-btn {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .reset-btn:hover {
            background: #c82333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
            vertical-align: top;
        }
        th {
            background-color: #007bff;
            color: white;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
        }
        select, input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 8px;
        }
        .search-row:last-child {
            margin-bottom: 0;
        }
        input[type="text"] {
            width: 220px;
        }
        label {
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .status-msg {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Daily Character Tracker</h1>
    <div class="status-msg" id="statusMsg">Synchronizing universal master items list...</div>
    <button class="reset-btn" onclick="masterReset()">Master Reset All</button>

    <!-- Global unified shared auto-fill repository container -->
    <datalist id="universalSuggestions"></datalist>

    <table>
        <thead>
            <tr>
                <th style="width: 20%;">Character</th>
                <th style="width: 15%;">Level</th>
                <th style="width: 20%;">Activity</th>
                <th style="width: 45%;">Favorite Gift Item (Daily Trackers)</th>
            </tr>
        </thead>
        <tbody id="trackerBody"></tbody>
    </table>
</div>

<script>
    const characters = ["Mickey", "Minnie", "Goofy", "Merlin", "Scrooge", "WALL-E", "Moana", "Maui", "Remy", "Ursula", "Kristoff", "Donald", "Mother Gothel", "Anna", "Elsa", "Ariel", "Eric", "Scar", "Buzz", "Woody", "Simba", "Nala", "Mirabel", "Vanellope", "Fairy Godmother", "Belle", "Beast", "Jack Skellington", "Mike Wazowski", "Sulley", "Oswald", "Daisy Duck", "Mulan", "Mushu", "Tiana", "Jafar", "Gaston", "Rapunzel", "EVE", "Merida", "Hades", "Aurora", "Flynn", "Cruella", "Tinker Bell", "Tigger"];
    const activities = ["Gardening", "Fishing", "Mining", "Foraging", "Digging"];
    
    let globalItemMasterSet = new Set();

    function parseCSVWithMultiLines(text) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let insideQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            let nextChar = text[i + 1];

            if (char === '"') {
                if (insideQuotes && nextChar === '"') {
                    currentField += '"';
                    i++; 
                } else {
                    insideQuotes = !insideQuotes;
                }
            } else if (char === ',' && !insideQuotes) {
                currentRow.push(currentField);
                currentField = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                currentRow.push(currentField);
                if (currentRow.length > 0 && currentRow.some(f => f.trim().length > 0)) {
                    rows.push(currentRow);
                }
                currentRow = [];
                currentField = '';
            } else {
                currentField += char;
            }
        }
        if (currentField || currentRow.length > 0) {
            currentRow.push(currentField);
            rows.push(currentRow);
        }
        return rows;
    }

    async function loadAndRegisterFile(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) return;
            const text = await response.text();
            const parsedRows = parseCSVWithMultiLines(text);
            
            parsedRows.forEach((columns, index) => {
                if (index === 0 || columns.length < 1) return;
                const name = columns[0].trim();
                if (name && name.toLowerCase() !== 'name' && name.toLowerCase() !== 'category') {
                    globalItemMasterSet.add(name);
                }
            });
        } catch (e) {
            console.warn(`Skipped loading option: ${url}`);
        }
    }

    async function initializeUniversalAutofill() {
        // Query all files in parallel to populate the universal lookup pool
        await loadAndRegisterFile('./Meals.csv');
        await loadAndRegisterFile('./Fishing.csv');
        await loadAndRegisterFile('./Gems.csv');
        await loadAndRegisterFile('./Flowers.csv');
        await loadAndRegisterFile('./Resources.csv');
        await loadAndRegisterFile('./Crafting.csv');
        await loadAndRegisterFile('./Ingredients.csv');

        // Convert the set back into an alphabetized array
        const sortedItems = Array.from(globalItemMasterSet).sort((a, b) => 
            a.localeCompare(b, undefined, { sensitivity: 'base' })
        );

        const datalist = document.getElementById('universalSuggestions');
        sortedItems.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item;
            datalist.appendChild(opt);
        });

        document.getElementById('statusMsg').textContent = `Universal cross-linking complete! Loaded ${sortedItems.length} total items and materials.`;
        document.getElementById('statusMsg').style.color = '#28a745';
    }

    function buildTrackerInterface() {
        const tbody = document.getElementById('trackerBody');
        characters.forEach((char, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${char}</strong></td>
                <td>
                    <select id="lvl-${index}" onchange="saveData()">
                        ${[...Array(10).keys()].map(i => `<option value="${i+1}">${i+1}</option>`).join('')}
                        <option value="lock">🔒</option>
                    </select>
                </td>
                <td>
                    <select id="act-${index}" onchange="saveData()">
                        ${activities.map(a => `<option value="${a}">${a}</option>`).join('')}
                    </select>
                </td>
                <td>
                    ${[1, 2, 3].map(n => `
                        <div class="search-row">
                            <!-- Bound to the master cross-linked multi-file search pool -->
                            <input type="text" id="s-${index}-${n}" list="universalSuggestions" placeholder="Type favorite meal or item..." oninput="saveData()">
                            <label><input type="checkbox" id="inv-${index}-${n}" onchange="saveData()"> In Inventory</label>
                            <label><input type="checkbox" id="done-${index}-${n}" onchange="checkDoneStep(${index}, ${n})"> Done</label>
                        </div>
                    `).join('')}
                </td>
            `;
            tbody.appendChild(row);
        });
        loadSavedData();
    }

    function checkDoneStep(charIdx, n) {
        const doneBox = document.getElementById(`done-${charIdx}-${n}`);
        if (doneBox.checked) {
            // Reset that specific search engine row instantly back to blank
            document.getElementById(`s-${charIdx}-${n}`).value = "";
            document.getElementById(`inv-${charIdx}-${n}`).checked = false;
            doneBox.checked = false; 
        }
        saveData();
    }

    function saveData() {
        const dataState = {};
        document.querySelectorAll('select, input').forEach(el => {
            if (el.id) {
                dataState[el.id] = (el.type === 'checkbox' ? el.checked : el.value);
            }
        });
        localStorage.setItem('ddvCharacterProgressState', JSON.stringify(dataState));
    }

    function loadSavedData() {
        const dataState = JSON.parse(localStorage.getItem('ddvCharacterProgressState') || "{}");
        Object.keys(dataState).forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                if (el.type === 'checkbox') {
                    el.checked = dataState[id];
                } else {
                    el.value = dataState[id];
                }
            }
        });
    }

    function masterReset() {
        if (confirm("Are you sure you want to run a master reset? This clears all entries back to blank.")) {
            localStorage.removeItem('ddvCharacterProgressState');
            location.reload();
        }
    }

    async function init() {
        buildTrackerInterface();
        await initializeUniversalAutofill();
    }

    init();
</script>
</body>
</html>
