<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDV Universal Character Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: auto;
            max-width: 1350px;
        }
        .quick-lookup-box {
            background: #eef2f7;
            border: 2px solid #007bff;
            border-radius: 8px;
            padding: 15px;
            max-width: 500px;
            margin: 0 auto 25px auto;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,123,255,0.1);
        }
        .quick-lookup-box label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #0056b3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #quickLookupResult {
            margin-top: 10px;
            text-align: left;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #111;
            text-align: center;
        }
        .reset-btn {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
            width: 100%;
            display: block;
            box-sizing: border-box;
        }
        @media(min-width: 576px) {
            .reset-btn { width: auto; display: inline-block; }
        }
        .reset-btn:hover { background: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        tr { position: relative; }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: left;
            vertical-align: top;
            transition: background-color 0.2s ease;
        }
        th { background-color: #007bff; color: white; font-weight: 600; font-size: 13px; text-transform: uppercase; }
        .col-shrink { width: 1%; white-space: nowrap; }
        .lockout-target { position: relative; }
        .char-cell { display: flex; flex-direction: column; align-items: center; text-align: center; font-size: 14px; min-width: 110px; }
        .editable-name { display: inline-block; border-bottom: 1px dashed #ccc; padding: 2px 4px; outline: none; cursor: text; }
        .editable-name:focus { border-bottom: 1px solid #007bff; background-color: #fffdf0; }
        .locked-name { display: inline-block; padding: 2px 4px; font-weight: bold; }
        .char-thumb { width: 50px; height: 50px; object-fit: contain; border-radius: 6px; background-color: #f8f9fa; border: 1px solid #e1e4e8; margin-top: 6px; }
        select, input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; width: 100%; }
        .trackers-horizontal-container { display: flex; gap: 12px; }
        .tracker-column { flex: 1; background-color: #fafbfc; border: 1px solid #e1e4e8; border-radius: 6px; padding: 8px; min-width: 220px; }
        .search-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
        .checkbox-row { display: flex; gap: 12px; font-size: 11px; margin-top: 4px; }
        .checkbox-row label { cursor: pointer; display: inline-flex; align-items: center; gap: 4px; padding: 4px 0; }
        .bullet-list { margin: 0; padding-left: 14px; }
        .bullet-list li { margin-bottom: 2px; font-size: 11px; }

        .info-card {
            border-radius: 4px;
            padding: 8px;
            font-size: 11px;
            color: #222;
            line-height: 1.35;
            border: 1px solid transparent;
            margin-top: 6px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .info-card-text { flex-grow: 1; }
        .info-card-thumb { width: 32px; height: 32px; object-fit: contain; border-radius: 4px; background-color: #fff; border: 1px solid #eee; flex-shrink: 0; }
        
        .info-card.meal { background-color: #fff9db; border-color: #ffe066; }
        .info-card.fish { background-color: #eef7ff; border-color: #bce0ff; }
        .info-card.gem { background-color: #fdf2ff; border-color: #f1c6ff; }
        .info-card.flower { background-color: #fff4f4; border-color: #ffcccc; }
        .info-card.resource { background-color: #f4fff4; border-color: #ccffcc; }
        .info-card.crafting { background-color: #fffdf2; border-color: #ffe6cc; }
        
        /* Subtle styling text block for the cross-linked ingredient sub-locations */
        .sub-ingredient-location {
            color: #71717a;
            font-style: italic;
            margin-left: 5px;
            font-size: 10px;
        }

        tr.max-level td.lockout-target { background-color: #1a1d20 !important; }
        tr.max-level td.lockout-target * { visibility: hidden !important; }
        .cell-lock-mask { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; z-index: 5; box-sizing: border-box; }
        .cell-lock-mask.centered-content { display: none; align-items: center; justify-content: flex-start; padding-left: 20px; font-size: 18px; font-weight: 600; color: #666; user-select: none; }
        tr.locked-out .cell-lock-mask { display: block; }
        tr.locked-out .cell-lock-mask.centered-content { display: flex; }
        tr.locked-out td.lockout-target * { visibility: hidden !important; }
        .status-msg { text-align: center; color: #666; font-style: italic; margin-bottom: 15px; font-size: 14px; }

        @media (max-width: 768px) {
            thead { display: none; }
            table, tbody, tr, td { display: block; width: 100% !important; box-sizing: border-box; }
            tr { margin-bottom: 25px; border: 1px solid #ddd; border-radius: 8px; background-color: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
            td { border: none !important; padding: 8px 0 !important; }
            .char-cell { flex-direction: row; justify-content: flex-start; gap: 15px; text-align: left; }
            .char-thumb { margin-top: 0; }
            .trackers-horizontal-container { flex-direction: column; gap: 10px; }
            .tracker-column { min-width: 0; }
            .cell-lock-mask { height: calc(100% - 16px); top: 8px; border-radius: 6px; }
            .cell-lock-mask.centered-content { justify-content: center; padding-left: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="quick-lookup-box">
        <label for="quickLookupInput">🔍 Quick Item Lookup Tool</label>
        <input type="text" id="quickLookupInput" list="universalSuggestions" placeholder="Type database item..." oninput="triggerQuickLookup()">
        <div id="quickLookupResult"></div>
    </div>

    <h1>Daily Character Tracker</h1>
    <div class="status-msg" id="statusMsg">Synchronizing datasets...</div>
    <button class="reset-btn" onclick="masterReset()">Master Reset All</button>

    <datalist id="universalSuggestions"></datalist>

    <table>
        <thead>
            <tr>
                <th class="col-shrink">Character</th>
                <th class="col-shrink">Level</th>
                <th class="col-shrink">Activity</th>
                <th>Favorite Gift Items (Daily Trackers)</th>
            </tr>
        </thead>
        <tbody id="trackerBody"></tbody>
    </table>
</div>

<script>
    const characters = [
        "Aladdin", "Jafar", "Jasmine", "Alice", "Cheshire Cat", "Belle", "Cogsworth", "Gaston", 
        "Lumiere", "The Beast", "Merida", "Cinderella", "The Fairy Godmother", "The Forgotten", 
        "Mirabel", "Anna", "Elsa", "Kristoff", "Olaf", "Hades", "Hercules", "Phil", "Joy", 
        "Sadness", "Lady", "Tramp", "Stitch", "Daisy", "Donald Duck", "Goofy", "Mickey Mouse", 
        "Minnie Mouse", "Scrooge McDuck", "Maui", "Moana", "Mike Wazowski", "Sulley", "Mulan", 
        "Mushu", "Cruella", "Oswald", "Peter Pan", "Tinker Bell", "Pocahontas", "Remy", "Aurora", 
        "Maleficent", "Snow White", "Flynn", "Mother Gothel", "Rapunzel", "Nala", "Pumbaa", 
        "Scar", "Simba", "Timon", "Ariel", "Prince Eric", "Ursula", "Tiana", "Merlin", 
        "Jack Skellington", "Sally", "Buzz Lightyear", "Woody", "EVE", "WALL-E", 
        "Eeyore", "Piglet", "Tigger", "Winnie The Pooh", "Vanellope"
    ];

    const activities = ["Digging", "Fishing", "Foraging", "Gardening", "Mining", "Snippet Catching", "Timebending"];
    const characterImageOverrides = {
        "mickey mouse": "Mickey_Mouse", "minnie mouse": "Minnie_Mouse", "scrooge mcduck": "Scrooge_McDuck",
        "donald duck": "Donald_Duck", "prince eric": "Prince_Eric", "buzz lightyear": "Buzz_Lightyear",
        "the fairy godmother": "The_Fairy_Godmother", "the beast": "The_Beast", "daisy": "Daisy", "the forgotten": "The_Forgotten"
    };

    let recipeDatabase = {};
    let materialDatabase = {};
    let globalItemMasterSet = new Set();

    function parseCSVWithMultiLines(text) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let insideQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i]; let nextChar = text[i + 1];
            if (char === '"') {
                if (insideQuotes && nextChar === '"') { currentField += '"'; i++; } else { insideQuotes = !insideQuotes; }
            } else if (char === ',' && !insideQuotes) {
                currentRow.push(currentField); currentField = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                currentRow.push(currentField);
                if (currentRow.length > 0 && currentRow.some(f => f.trim().length > 0)) rows.push(currentRow);
                currentRow = []; currentField = '';
            } else { currentField += char; }
        }
        if (currentField || currentRow.length > 0) { currentRow.push(currentField); rows.push(currentRow); }
        return rows;
    }

    function formatToListHtml(text) {
        if (!text) return 'n/a';
        const items = text.split('\n').map(i => i.trim()).filter(i => i.length > 0);
        if (items.length === 0) return 'n/a';
        if (items.length === 1) return items[0];
        return `<ul class="bullet-list">${items.map(item => `<li>${item}</li>`).join('')}</ul>`;
    }

    async function fetchAndRegister(url, type, colIndices) {
        try {
            const response = await fetch(url);
            if (!response.ok) return;
            const text = await response.text();
            const parsedRows = parseCSVWithMultiLines(text);
            parsedRows.forEach((columns, index) => {
                if (index === 0 || columns.length <= Math.max(...colIndices)) return;
                const name = columns[colIndices[0]].trim();
                if (!name || name.toLowerCase() === 'name' || name.toLowerCase() === 'category') return;
                
                globalItemMasterSet.add(name);
                materialDatabase[name.toLowerCase()] = {
                    name: name, type: type,
                    field1: columns[colIndices[1]] ? columns[colIndices[1]].trim() : '',
                    field2: columns[colIndices[2]] ? columns[colIndices[2]].trim() : '',
                    field3: columns[colIndices[3]] ? columns[colIndices[3]].trim() : ''
                };
            });
        } catch (e) { console.warn(`Skipped: ${url}`); }
    }

    async function initializeUniversalAutofill() {
        await fetchAndRegister('./Fishing.csv', 'fish', [0, 1, 2]);       
        await fetchAndRegister('./Gems.csv', 'gem', [0, 1]);                 
        await fetchAndRegister('./Flowers.csv', 'flower', [0, 2, 1]);          
        await fetchAndRegister('./Resources.csv', 'resource', [0, 1]);       
        await fetchAndRegister('./Crafting.csv', 'crafting', [0, 1]);        
        await fetchAndRegister('./Other Fish.csv', 'fish', [0, 1, 2]);
        await fetchAndRegister('./Other Crafting.csv', 'crafting', [0, 1, 2]);
        await fetchAndRegister('./Functional.csv', 'crafting', [0, 1]);
        await fetchAndRegister('./Materials.csv', 'resource', [0, 1, 2]);
        await fetchAndRegister('./Ingredients.csv', 'resource', [0, 1]);

        try {
            const mealResponse = await fetch('./Meals.csv');
            if (mealResponse.ok) {
                const mealText = await mealResponse.text();
                parseCSVWithMultiLines(mealText).forEach((columns, index) => {
                    if (index === 0 || columns.length < 2) return;
                    const name = columns[0].trim();
                    if (name && name.toLowerCase() !== 'name') {
                        globalItemMasterSet.add(name);
                        recipeDatabase[name.toLowerCase()] = columns[1].split('\n').map(i => i.trim()).filter(i => i.length > 0);
                    }
                });
            }
        } catch (e) { console.warn("Meals file bypassed."); }

        const sortedItems = Array.from(globalItemMasterSet).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        const datalist = document.getElementById('universalSuggestions');
        sortedItems.forEach(item => {
            const opt = document.createElement('option'); opt.value = item; datalist.appendChild(opt);
        });
        document.getElementById('statusMsg').textContent = `Loaded ${sortedItems.length} cross-linked profiles!`;
    }

    function buildTrackerInterface() {
        const tbody = document.getElementById('trackerBody');
        characters.forEach((char, index) => {
            const lowerChar = char.toLowerCase();
            let targetFileName = characterImageOverrides[lowerChar] || char.replace(/\s+/g, '_');
            const directWikiImgUrl = `https://dreamlightvalleywiki.com/Special:FilePath/${targetFileName}.png`;
            let nameHtml = (char === "The Forgotten") ? `<span class="editable-name" contenteditable="true" id="name-${index}" oninput="saveData()">${char}</span>` : `<span class="locked-name" id="name-${index}">${char}</span>`;

            const row = document.createElement('tr'); row.id = `row-${index}`;
            row.innerHTML = `
                <td class="col-shrink"><div class="char-cell">${nameHtml}<img class="char-thumb" src="${directWikiImgUrl}" alt="${char}"></div></td>
                <td class="col-shrink"><select id="lvl-${index}" onchange="evaluateLevelState(${index})">${[...Array(10).keys()].map(i => `<option value="${i+1}">${i+1}</option>`).join('')}<option value="lock">🔒</option></select></td>
                <td class="col-shrink lockout-target"><select id="act-${index}" onchange="saveData()">${activities.map(a => `<option value="${a}">${a}</option>`).join('')}</select><div class="cell-lock-mask"></div></td>
                <td class="lockout-target">
                    <div class="trackers-horizontal-container">
                        ${[1, 2, 3].map(n => `
                            <div class="tracker-column">
                                <div class="search-row"><input type="text" id="s-${index}-${n}" list="universalSuggestions" placeholder="Item ${n}..." oninput="updateLiveCard(${index}, ${n})"></div>
                                <div class="checkbox-row">
                                    <label><input type="checkbox" id="inv-${index}-${n}" onchange="saveData()"> In Inv</label>
                                    <label><input type="checkbox" id="done-${index}-${n}" onchange="checkDoneStep(${index}, ${n})"> Done</label>
                                </div>
                                <div id="card-${index}-${n}"></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="cell-lock-mask centered-content"><span>🔒 Locked</span></div>
                </td>
            `;
            tbody.appendChild(row);
        });
        loadSavedData();
    }

    // New Deep Cross-Reference Engine for Recipe Ingredients
    function generateIngredientLineHtml(ingredientName) {
        const lookupKey = ingredientName.toLowerCase().trim();
        const foundData = materialDatabase[lookupKey];
        
        if (foundData) {
            // Pull location source field matching entry context boundaries
            let locInfo = foundData.field1 || foundData.field2 || foundData.field3 || '';
            if (locInfo) {
                // Strip unnecessary multi-line breaks for sub-text cards clarity
                let formattedLoc = locInfo.replace(/\n/g, ' / ').trim();
                return `<li>${ingredientName} <span class="sub-ingredient-location">(${formattedLoc})</span></li>`;
            }
        }
        return `<li>${ingredientName}</li>`;
    }

    function renderCardContents(itemName) {
        const key = itemName.toLowerCase().trim(); if (!key) return '';
        
        // If it's a cooked meal, construct deep lines for all required base components
        if (recipeDatabase[key]) {
            const ingredientLines = recipeDatabase[key].map(ing => generateIngredientLineHtml(ing)).join('');
            return `<div class="info-card meal"><div class="info-card-text"><strong>🍳 Recipe Ingredients & Locations:</strong><ul class="bullet-list">${ingredientLines}</ul></div></div>`;
        }
        
        const mat = materialDatabase[key];
        if (mat) {
            let imgHtml = '';
            if (mat.type === 'flower') {
                imgHtml = `<img class="info-card-thumb" src="https://dreamlightvalleywiki.com/Special:FilePath/${mat.name.replace(/\s+/g, '_')}.png" onerror="this.style.display='none';">`;
            }
            if (mat.type === 'fish') return `<div class="info-card fish"><div class="info-card-text"><strong>🎣 Ripple:</strong> ${mat.field1 || 'None'}<br><strong>📍 Locations:</strong> ${formatToListHtml(mat.field2)}</div></div>`;
            if (mat.type === 'gem') return `<div class="info-card gem"><div class="info-card-text"><strong>💎 Locations:</strong> ${formatToListHtml(mat.field1)}</div></div>`;
            if (mat.type === 'flower') return `<div class="info-card flower">${imgHtml}<div class="info-card-text"><strong>🌸 Locations:</strong> ${formatToListHtml(mat.field1 || mat.field2)}</div></div>`;
            if (mat.type === 'resource' || mat.type === 'crafting') return `<div class="info-card resource"><div class="info-card-text"><strong>📦 Sources:</strong> ${formatToListHtml(mat.field1 || mat.field2)}</div></div>`;
        }
        return '';
    }

    function triggerQuickLookup() {
        const inputVal = document.getElementById('quickLookupInput').value;
        const targetDiv = document.getElementById('quickLookupResult');
        if(!inputVal.trim()) { targetDiv.innerHTML = ''; return; }
        const cardHtml = renderCardContents(inputVal);
        targetDiv.innerHTML = cardHtml ? cardHtml : `<div style="font-size:11px; color:#999; margin-top:5px;">No profile found for this item.</div>`;
    }

    function evaluateLevelState(charIdx) {
        const lvlBox = document.getElementById(`lvl-${charIdx}`); const targetRow = document.getElementById(`row-${charIdx}`);
        targetRow.classList.remove('max-level', 'locked-out');
        if (lvlBox.value === "10") { targetRow.classList.add('max-level'); clearRowInputs(charIdx); }
        else if (lvlBox.value === "lock") { targetRow.classList.add('locked-out'); clearRowInputs(charIdx); }
        saveData();
    }

    function clearRowInputs(charIdx) {
        [1, 2, 3].forEach(n => {
            document.getElementById(`s-${charIdx}-${n}`).value = "";
            document.getElementById(`inv-${charIdx}-${n}`).checked = false;
            document.getElementById(`card-${charIdx}-${n}`).innerHTML = "";
        });
    }

    function updateLiveCard(charIdx, n) {
        const val = document.getElementById(`s-${charIdx}-${n}`).value;
        document.getElementById(`card-${charIdx}-${n}`).innerHTML = renderCardContents(val);
        saveData();
    }

    function checkDoneStep(charIdx, n) {
        const doneBox = document.getElementById(`done-${charIdx}-${n}`);
        if (doneBox.checked) {
            document.getElementById(`s-${charIdx}-${n}`).value = "";
            document.getElementById(`inv-${charIdx}-${n}`).checked = false;
            document.getElementById(`card-${charIdx}-${n}`).innerHTML = "";
            doneBox.checked = false; 
        }
        saveData();
    }

    function saveData() {
        const dataState = {};
        document.querySelectorAll('select, input').forEach(el => { if (el.id) dataState[el.id] = (el.type === 'checkbox' ? el.checked : el.value); });
        const forgottenNode = document.querySelector('.editable-name');
        if (forgottenNode && forgottenNode.id) dataState[forgottenNode.id] = forgottenNode.innerText;
        localStorage.setItem('ddvCharacterProgressState', JSON.stringify(dataState));
    }

    function loadSavedData() {
        const dataState = JSON.parse(localStorage.getItem('ddvCharacterProgressState') || "{}");
        Object.keys(dataState).forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                if (el.classList.contains('editable-name')) el.innerText = dataState[id];
                else if (el.type === 'checkbox') el.checked = dataState[id];
                else el.value = dataState[id];
            }
        });
        characters.forEach((char, index) => {
            const lvlBox = document.getElementById(`lvl-${index}`); const targetRow = document.getElementById(`row-${index}`);
            if (lvlBox.value === "10") targetRow.classList.add('max-level');
            else if (lvlBox.value === "lock") targetRow.classList.add('locked-out');
            [1, 2, 3].forEach(n => {
                const val = document.getElementById(`s-${index}-${n}`).value;
                if (val && lvlBox.value !== "10" && lvlBox.value !== "lock") document.getElementById(`card-${index}-${n}`).innerHTML = renderCardContents(val);
            });
        });
    }

    function masterReset() {
        if (confirm("Master reset all profiles?")) { localStorage.removeItem('ddvCharacterProgressState'); location.reload(); }
    }

    async function init() { buildTrackerInterface(); await initializeUniversalAutofill(); }
    init();
</script>
</body>
</html>
