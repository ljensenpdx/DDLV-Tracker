<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic DDV Recipe Fetcher</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #111;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fff;
        }
        select:disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 5px solid #007bff;
            display: none;
        }
        .result-box.error {
            border-left-color: #dc3545;
            background-color: #fff5f5;
        }
        .meal-title {
            font-size: 20px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .ingredient-list {
            padding-left: 20px;
            margin: 0;
        }
        .ingredient-list li {
            margin-bottom: 6px;
            font-size: 16px;
        }
        .status-msg {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DDV Recipe Auto-Fetcher</h1>
    
    <div class="form-group">
        <label for="mealSelect">Select a Meal:</label>
        <select id="mealSelect" disabled>
            <option value="">-- Loading compressed data stream... --</option>
        </select>
    </div>

    <div class="status-msg" id="statusMsg">Connecting to lightweight endpoint...</div>

    <div class="result-box" id="resultBox">
        <p class="meal-title" id="resultTitle"></p>
        <ul class="ingredient-list" id="resultIngredients"></ul>
    </div>
</div>

<script>
    const mealSelect = document.getElementById('mealSelect');
    const statusMsg = document.getElementById('statusMsg');
    const resultBox = document.getElementById('resultBox');
    const resultTitle = document.getElementById('resultTitle');
    const resultIngredients = document.getElementById('resultIngredients');

    // Bypasses the heavy layout page by forcing a raw system data export text view path
    const targetUrl = "https://disneydreamlightvalley.fandom.com/wiki/Meals?action=render";
    const productionFreeProxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
    
    let recipeDatabase = {};

    async function initPage() {
        try {
            const response = await fetch(productionFreeProxyUrl);
            if (!response.ok) throw new Error("The payload size limit or engine is busy. Refresh to retry.");
            
            const html = await response.text(); 
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const rows = doc.querySelectorAll('table.wikitable tr');
            
            let mealsFoundCount = 0;
            mealSelect.innerHTML = '<option value="">-- Choose a Meal --</option>';

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 3) {
                    const name = cells[0].textContent.replace(/[\n\t]/g, '').trim();
                    const ingredientsRaw = cells[2].textContent.trim();
                    
                    if (name && ingredientsRaw && !recipeDatabase[name] && name !== "Recipe") {
                        const ingredientsArray = ingredientsRaw.split(/,(?![^(]*\))/).map(i => i.trim());
                        recipeDatabase[name] = ingredientsArray;
                        mealsFoundCount++;

                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        mealSelect.appendChild(opt);
                    }
                }
            });

            if (mealsFoundCount === 0) {
                throw new Error("Target matrix structure missing from stripped code data.");
            }

            mealSelect.disabled = false;
            statusMsg.textContent = `Successfully loaded ${mealsFoundCount} recipes from lightweight stream.`;
            statusMsg.style.color = '#28a745';

        } catch (err) {
            statusMsg.textContent = `Setup Failure: ${err.message}`;
            statusMsg.style.color = '#dc3545';
            mealSelect.innerHTML = '<option value="">-- Loading failed --</option>';
        }
    }

    mealSelect.addEventListener('change', () => {
        const selection = mealSelect.value;
        resultBox.style.display = 'none';
        resultIngredients.innerHTML = '';

        if (!selection || !recipeDatabase[selection]) return;

        resultTitle.textContent = selection;
        recipeDatabase[selection].forEach(ingredient => {
            const li = document.createElement('li');
            li.textContent = ingredient;
            resultIngredients.appendChild(li);
        });

        resultBox.style.display = 'block';
    });

    initPage();
</script>

</body>
</html>
