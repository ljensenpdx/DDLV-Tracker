<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDV Master Recipe Search</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #111;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fff;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 5px solid #007bff;
            display: none;
        }
        .meal-title {
            font-size: 20px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 12px;
            color: #111;
        }
        .ingredient-list {
            padding-left: 20px;
            margin: 0;
        }
        .ingredient-list li {
            margin-bottom: 8px;
            font-size: 16px;
            color: #444;
        }
        .status-msg {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DDV Complete Search</h1>
    
    <div class="form-group">
        <label for="searchBar">Search Meal Name:</label>
        <input type="text" id="searchBar" placeholder="Type to filter recipes..." disabled>
    </div>

    <div class="form-group">
        <label for="mealSelect">Select a Recipe:</label>
        <select id="mealSelect" disabled>
            <option value="">-- Syncing Master Reference... --</option>
        </select>
    </div>

    <div class="status-msg" id="statusMsg">Loading master database file...</div>

    <div class="result-box" id="resultBox">
        <p class="meal-title" id="resultTitle"></p>
        <ul class="ingredient-list" id="resultIngredients"></ul>
    </div>
</div>

<script>
    const searchBar = document.getElementById('searchBar');
    const mealSelect = document.getElementById('mealSelect');
    const statusMsg = document.getElementById('statusMsg');
    const resultBox = document.getElementById('resultBox');
    const resultTitle = document.getElementById('resultTitle');
    const resultIngredients = document.getElementById('resultIngredients');

    let recipeDatabase = {};
    let sortedMealNames = [];

    async function loadMasterCSV() {
        try {
            // Updated to reference your renamed file verbatim
            const response = await fetch('./Meals.csv');
            if (!response.ok) throw new Error("Could not find Meals.csv in the repository root directory.");
            
            const dataText = await response.text();
            const lines = dataText.replace(/\r/g, '').split('\n');
            let count = 0;
            
            lines.forEach((line, index) => {
                if (index === 0 || !line.trim()) return;
                
                // Track columns gracefully in case text fields utilize wrapping quotes
                let columns = [];
                let currentColumn = '';
                let insideQuotes = false;
                
                for (let i = 0; i < line.length; i++) {
                    let char = line[i];
                    if (char === '"') {
                        insideQuotes = !insideQuotes;
                    } else if (char === ',' && !insideQuotes) {
                        columns.push(currentColumn.trim());
                        currentColumn = '';
                    } else {
                        currentColumn += char;
                    }
                }
                columns.push(currentColumn.trim());
                
                if (columns.length >= 2) {
                    const name = columns[0].replace(/^"|"$/g, '').trim();
                    const ingredientsRaw = columns[1].replace(/^"|"$/g, '');
                    
                    if (name && ingredientsRaw && name.toLowerCase() !== 'name') {
                        // Split multi-line cells using line-breaks
                        const delimiter = ingredientsRaw.includes('\n') ? '\n' : '\\n';
                        recipeDatabase[name] = ingredientsRaw.split(delimiter)
                                                            .map(i => i.trim())
                                                            .filter(i => i.length > 0);
                        count++;
                    }
                }
            });

            sortedMealNames = Object.keys(recipeDatabase).sort();
            renderDropdown(sortedMealNames);

            searchBar.disabled = false;
            mealSelect.disabled = false;
            statusMsg.textContent = `Successfully synchronized ${count} recipes from Meals.csv.`;
            statusMsg.style.color = '#28a745';

        } catch (err) {
            statusMsg.textContent = `Error: ${err.message}`;
            statusMsg.style.color = '#dc3545';
        }
    }

    function renderDropdown(list) {
        mealSelect.innerHTML = '';
        const defaultOpt = document.createElement('option');
        defaultOpt.value = "";
        defaultOpt.textContent = `-- Select from ${list.length} Recipes --`;
        mealSelect.appendChild(defaultOpt);

        list.forEach(meal => {
            const opt = document.createElement('option');
            opt.value = meal;
            opt.textContent = meal;
            mealSelect.appendChild(opt);
        });
    }

    searchBar.addEventListener('input', () => {
        const query = searchBar.value.toLowerCase();
        const filteredList = sortedMealNames.filter(name => name.toLowerCase().includes(query));
        renderDropdown(filteredList);
    });

    mealSelect.addEventListener('change', () => {
        const selection = mealSelect.value;
        resultBox.style.display = 'none';
        resultIngredients.innerHTML = '';

        if (!selection || !recipeDatabase[selection]) return;

        resultTitle.textContent = selection;
        recipeDatabase[selection].forEach(ingredient => {
            const li = document.createElement('li');
            li.textContent = ingredient;
            resultIngredients.appendChild(li);
        });

        resultBox.style.display = 'block';
    });

    loadMasterCSV();
</script>

</body>
</html>
