<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic DDV Recipe Fetcher</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #111;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fff;
        }
        select:disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 5px solid #007bff;
            display: none;
        }
        .result-box.error {
            border-left-color: #dc3545;
            background-color: #fff5f5;
        }
        .meal-title {
            font-size: 20px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .ingredient-list {
            padding-left: 20px;
            margin: 0;
        }
        .ingredient-list li {
            margin-bottom: 6px;
            font-size: 16px;
        }
        .status-msg {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DDV Recipe Auto-Fetcher</h1>
    
    <div class="form-group">
        <label for="mealSelect">Select a Meal:</label>
        <select id="mealSelect" disabled>
            <option value="">-- Loading text stream... --</option>
        </select>
    </div>

    <div class="status-msg" id="statusMsg">Connecting to ultra-lightweight endpoint...</div>

    <div class="result-box" id="resultBox">
        <p class="meal-title" id="resultTitle"></p>
        <ul class="ingredient-list" id="resultIngredients"></ul>
    </div>
</div>

<script>
    const mealSelect = document.getElementById('mealSelect');
    const statusMsg = document.getElementById('statusMsg');
    const resultBox = document.getElementById('resultBox');
    const resultTitle = document.getElementById('resultTitle');
    const resultIngredients = document.getElementById('resultIngredients');

    // Strips out all HTML, tables, links, images and styles. Returns pure plain text layout variables.
    const apiEndpoint = "https://disneydreamlightvalley.fandom.com/api.php?action=parse&page=Meals&format=json&prop=wikitext";
    const productionFreeProxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiEndpoint)}`;
    
    let recipeDatabase = {};

    async function initPage() {
        try {
            const response = await fetch(productionFreeProxyUrl);
            if (!response.ok) throw new Error("API server wrapper limit hit. Reload the browser.");
            
            const json = await response.json();
            
            if (!json.parse || !json.parse.wikitext || !json.parse.wikitext['*']) {
                throw new Error("Invalid text stream structure returned from API query.");
            }
            
            const rawText = json.parse.wikitext['*'];
            
            // Clean out links, formatting brackets, templates, and asset weights
            const lines = rawText.split('\n');
            let mealsFoundCount = 0;
            mealSelect.innerHTML = '<option value="">-- Choose a Meal --</option>';

            lines.forEach(line => {
                // Look for standard row lines that start with a row marker and contain structural text delimiters
                if (line.startsWith('|') && line.includes('||')) {
                    const columns = line.split('||');
                    if (columns.length >= 2) {
                        // Clean up row 1 (Meal Name) and row 2 (Ingredients List)
                        let mealName = columns[0].replace(/^\|/, '').replace(/\[\[|\]\]/g, '').trim();
                        let ingredientsRaw = columns[1].replace(/\[\[|\]\]/g, '').trim();
                        
                        // Drop structural layout header row triggers
                        if (mealName && ingredientsRaw && mealName !== "Recipe" && !mealName.includes('{') && !mealName.includes('}')) {
                            const ingredientsArray = ingredientsRaw.split(/,(?![^(]*\))/).map(i => i.trim());
                            
                            if (!recipeDatabase[mealName]) {
                                recipeDatabase[mealName] = ingredientsArray;
                                mealsFoundCount++;

                                const opt = document.createElement('option');
                                opt.value = mealName;
                                opt.textContent = mealName;
                                mealSelect.appendChild(opt);
                            }
                        }
                    }
                }
            });

            if (mealsFoundCount === 0) {
                throw new Error("No plain-text recipe data patterns could be parsed out.");
            }

            mealSelect.disabled = false;
            statusMsg.textContent = `Successfully loaded ${mealsFoundCount} recipes from lightweight text data stream.`;
            statusMsg.style.color = '#28a745';

        } catch (err) {
            statusMsg.textContent = `Setup Failure: ${err.message}`;
            statusMsg.style.color = '#dc3545';
            mealSelect.innerHTML = '<option value="">-- Loading failed --</option>';
        }
    }

    mealSelect.addEventListener('change', () => {
        const selection = mealSelect.value;
        resultBox.style.display = 'none';
        resultIngredients.innerHTML = '';

        if (!selection || !recipeDatabase[selection]) return;

        resultTitle.textContent = selection;
        recipeDatabase[selection].forEach(ingredient => {
            const li = document.createElement('li');
            li.textContent = ingredient;
            resultIngredients.appendChild(li);
        });

        resultBox.style.display = 'block';
    });

    initPage();
</script>

</body>
</html>
