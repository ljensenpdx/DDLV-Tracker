<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDV Master Recipe & Fishing Guide</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #111;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fff;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 5px solid #007bff;
            display: none;
        }
        .meal-title {
            font-size: 20px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 12px;
            color: #111;
        }
        .ingredient-list {
            padding-left: 20px;
            margin: 0;
        }
        .ingredient-list li {
            margin-bottom: 12px;
            font-size: 16px;
            color: #444;
        }
        /* Custom card overlay container for correlated fishing data rows */
        .fish-info-card {
            background-color: #eef7ff;
            border: 1px solid #bce0ff;
            border-radius: 6px;
            padding: 10px 14px;
            margin-top: 6px;
            font-size: 13px;
            color: #222;
            line-height: 1.4;
        }
        .fish-info-card strong {
            color: #0056b3;
        }
        .status-msg {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DDV Cooking & Fishing Tool</h1>
    
    <div class="form-group">
        <label for="searchBar">Search Meal Name:</label>
        <input type="text" id="searchBar" placeholder="Type to filter recipes..." disabled>
    </div>

    <div class="form-group">
        <label for="mealSelect">Select a Recipe:</label>
        <select id="mealSelect" disabled>
            <option value="">-- Synchronizing Databases... --</option>
        </select>
    </div>

    <div class="status-msg" id="statusMsg">Loading master database files...</div>

    <div class="result-box" id="resultBox">
        <p class="meal-title" id="resultTitle"></p>
        <ul class="ingredient-list" id="resultIngredients"></ul>
    </div>
</div>

<script>
    const searchBar = document.getElementById('searchBar');
    const mealSelect = document.getElementById('mealSelect');
    const statusMsg = document.getElementById('statusMsg');
    const resultBox = document.getElementById('resultBox');
    const resultTitle = document.getElementById('resultTitle');
    const resultIngredients = document.getElementById('resultIngredients');

    let recipeDatabase = {};
    let fishingDatabase = {};
    let sortedMealNames = [];

    // Smart CSV block handler to parse cells containing multiple newlines correctly
    function parseCSVWithMultiLines(text) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let insideQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            let nextChar = text[i + 1];

            if (char === '"') {
                if (insideQuotes && nextChar === '"') {
                    currentField += '"';
                    i++; 
                } else {
                    insideQuotes = !insideQuotes;
                }
            } else if (char === ',' && !insideQuotes) {
                currentRow.push(currentField);
                currentField = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                currentRow.push(currentField);
                if (currentRow.length > 0 && currentRow.some(f => f.trim().length > 0)) {
                    rows.push(currentRow);
                }
                currentRow = [];
                currentField = '';
            } else {
                currentField += char;
            }
        }
        if (currentField || currentRow.length > 0) {
            currentRow.push(currentField);
            rows.push(currentRow);
        }
        return rows;
    }

    async function loadAllDatabases() {
        try {
            // 1. Fetch and process the fish spreadsheet rows
            const fishResponse = await fetch('./Fishing.csv');
            if (fishResponse.ok) {
                const fishRawText = await fishResponse.text();
                const fishRows = parseCSVWithMultiLines(fishRawText);
                
                fishRows.forEach((columns, index) => {
                    if (index === 0 || columns.length < 3) return;
                    const fishName = columns[0].trim();
                    
                    fishingDatabase[fishName.toLowerCase()] = {
                        name: fishName,
                        ripples: columns[1] ? columns[1].replace(/\n/g, ' ').trim() : 'None',
                        locations: columns[2] ? columns[2].replace(/\n/g, ', ').trim() : 'Unknown',
                        notes: columns[3] ? columns[3].replace(/\n/g, ' ').trim() : ''
                    };
                });
            }

            // 2. Fetch and process the recipe collection array blocks
            const mealResponse = await fetch('./Meals.csv');
            if (!mealResponse.ok) throw new Error("Could not read Meals.csv in directory.");
            
            const mealRawText = await mealResponse.text();
            const parsedMealRows = parseCSVWithMultiLines(mealRawText);
            let count = 0;
            
            parsedMealRows.forEach((columns, index) => {
                if (index === 0 || columns.length < 2) return;
                
                const name = columns[0].trim();
                const ingredientsRaw = columns[1];
                
                if (name && ingredientsRaw && name.toLowerCase() !== 'name') {
                    recipeDatabase[name] = ingredientsRaw.split('\n')
                                                        .map(i => i.replace(/[\r\t]/g, '').trim())
                                                        .filter(i => i.length > 0);
                    count++;
                }
            });

            sortedMealNames = Object.keys(recipeDatabase).sort();
            renderDropdown(sortedMealNames);

            searchBar.disabled = false;
            mealSelect.disabled = false;
            statusMsg.textContent = `Synchronized ${count} meals and ${Object.keys(fishingDatabase).length} fish lines!`;
            statusMsg.style.color = '#28a745';

        } catch (err) {
            statusMsg.textContent = `Error: ${err.message}`;
            statusMsg.style.color = '#dc3545';
        }
    }

    function renderDropdown(list) {
        mealSelect.innerHTML = '';
        const defaultOpt = document.createElement('option');
        defaultOpt.value = "";
        defaultOpt.textContent = `-- Select from ${list.length} Recipes --`;
        mealSelect.appendChild(defaultOpt);

        list.forEach(meal => {
            const opt = document.createElement('option');
            opt.value = meal;
            opt.textContent = meal;
            mealSelect.appendChild(opt);
        });
    }

    searchBar.addEventListener('input', () => {
        const query = searchBar.value.toLowerCase();
        const filteredList = sortedMealNames.filter(name => name.toLowerCase().includes(query));
        renderDropdown(filteredList);
    });

    mealSelect.addEventListener('change', () => {
        const selection = mealSelect.value;
        resultBox.style.display = 'none';
        resultIngredients.innerHTML = '';

        if (!selection || !recipeDatabase[selection]) return;

        resultTitle.textContent = selection;
        recipeDatabase[selection].forEach(ingredient => {
            const li = document.createElement('li');
            li.textContent = ingredient;
            
            // Check if the item name or variant maps to a record in our fishing spreadsheet
            const cleanIngKey = ingredient.toLowerCase();
            if (fishingDatabase[cleanIngKey]) {
                const fish = fishingDatabase[cleanIngKey];
                
                const card = document.createElement('div');
                card.className = 'fish-info-card';
                card.innerHTML = `
                    <strong>🎣 Ripple:</strong> ${fish.ripples} | 
                    <strong>📍 Locations:</strong> ${fish.locations}
                    ${fish.notes ? `<br><strong>⚠️ Notes:</strong> ${fish.notes}` : ''}
                `;
                li.appendChild(card);
            }
            
            resultIngredients.appendChild(li);
        });

        resultBox.style.display = 'block';
    });

    loadAllDatabases();
</script>

</body>
</html>
