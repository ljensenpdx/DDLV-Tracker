<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDV Master Search Engine</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #111;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fff;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 5px solid #007bff;
            display: none;
        }
        .result-title {
            font-size: 22px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 4px;
            color: #111;
        }
        .result-type {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            color: #666;
            margin-bottom: 15px;
        }
        .section-heading {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            color: #555;
            margin-top: 15px;
            margin-bottom: 8px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }
        .ingredient-list, .usage-list {
            padding-left: 20px;
            margin: 0;
        }
        .ingredient-list li, .usage-list li {
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }
        .info-card {
            border-radius: 6px;
            padding: 10px 14px;
            margin-top: 6px;
            font-size: 13px;
            color: #222;
            line-height: 1.45;
            border: 1px solid transparent;
        }
        .info-card.fish { background-color: #eef7ff; border-color: #bce0ff; }
        .info-card.fish strong { color: #0056b3; }
        
        .info-card.gem { background-color: #fdf2ff; border-color: #f1c6ff; }
        .info-card.gem strong { color: #8a1dcf; }
        
        .info-card.flower { background-color: #fff4f4; border-color: #ffcccc; }
        .info-card.flower strong { color: #cc2929; }
        
        .info-card.resource { background-color: #f4fff4; border-color: #ccffcc; }
        .info-card.resource strong { color: #1e7a1e; }
        
        .info-card.crafting { background-color: #fffdf2; border-color: #ffe6cc; }
        .info-card.crafting strong { color: #b35900; }

        .status-msg {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DDV Master Database Engine</h1>
    
    <div class="form-group">
        <label for="searchBar">Search Anything (Meal, Fish, Gem, Flower, etc.):</label>
        <input type="text" id="searchBar" placeholder="Type name to filter master catalog..." disabled>
    </div>

    <div class="form-group">
        <label for="masterSelect">Select an Item Entry:</label>
        <select id="masterSelect" disabled>
            <option value="">-- Synchronizing Directories... --</option>
        </select>
    </div>

    <div class="status-msg" id="statusMsg">Loading master database files...</div>

    <div class="result-box" id="resultBox">
        <p class="result-title" id="resultTitle"></p>
        <p class="result-type" id="resultType"></p>
        <div id="resultContent"></div>
    </div>
</div>

<script>
    const searchBar = document.getElementById('searchBar');
    const masterSelect = document.getElementById('masterSelect');
    const statusMsg = document.getElementById('statusMsg');
    const resultBox = document.getElementById('resultBox');
    const resultTitle = document.getElementById('resultTitle');
    const resultType = document.getElementById('resultType');
    const resultContent = document.getElementById('resultContent');

    let recipeDatabase = {};      // Key: Meal Name -> Array of Ingredients
    let materialDatabase = {};    // Key: Lowercase Item Name -> Metadata Card Properties
    let masterItemCatalog = [];   // Unified Array of all parsed strings for select mapping

    function parseCSVWithMultiLines(text) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let insideQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            let nextChar = text[i + 1];

            if (char === '"') {
                if (insideQuotes && nextChar === '"') {
                    currentField += '"';
                    i++; 
                } else {
                    insideQuotes = !insideQuotes;
                }
            } else if (char === ',' && !insideQuotes) {
                currentRow.push(currentField);
                currentField = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                currentRow.push(currentField);
                if (currentRow.length > 0 && currentRow.some(f => f.trim().length > 0)) {
                    rows.push(currentRow);
                }
                currentRow = [];
                currentField = '';
            } else {
                currentField += char;
            }
        }
        if (currentField || currentRow.length > 0) {
            currentRow.push(currentField);
            rows.push(currentRow);
        }
        return rows;
    }

    function cleanList(text) {
        if (!text) return 'Unknown';
        return text.split('\n').map(i => i.trim()).filter(i => i.length > 0).join(', ');
    }

    async function fetchAndRegister(url, type, colIndices) {
        try {
            const response = await fetch(url);
            if (!response.ok) return;
            const rawText = await response.text();
            const rows = parseCSVWithMultiLines(rawText);
            
            rows.forEach((columns, index) => {
                if (index === 0 || columns.length <= Math.max(...colIndices)) return;
                const name = columns[colIndices[0]].trim();
                if (!name || name.toLowerCase() === 'name') return;
                
                materialDatabase[name.toLowerCase()] = {
                    name: name,
                    type: type,
                    field1: columns[colIndices[1]] ? cleanList(columns[colIndices[1]]) : '',
                    field2: columns[colIndices[2]] ? cleanList(columns[colIndices[2]]) : ''
                };
            });
        } catch (e) {
            console.warn(`Optional file omitted: ${url}`);
        }
    }

    async function loadAllDatabases() {
        try {
            // Index item metadata lookups natively
            await fetchAndRegister('./Fishing.csv', 'fish', [0, 1, 2, 3]);
            await fetchAndRegister('./Gems.csv', 'gem', [0, 1]);
            await fetchAndRegister('./Flowers.csv', 'flower', [0, 2, 1]);
            await fetchAndRegister('./Resources.csv', 'resource', [0, 1]);
            await fetchAndRegister('./Crafting.csv', 'crafting', [0, 1]);

            // Load primary recipes list
            const mealResponse = await fetch('./Meals.csv');
            if (!mealResponse.ok) throw new Error("Could not find Meals.csv in directory.");
            
            const mealRawText = await mealResponse.text();
            const parsedMealRows = parseCSVWithMultiLines(mealRawText);
            
            parsedMealRows.forEach((columns, index) => {
                if (index === 0 || columns.length < 2) return;
                const name = columns[0].trim();
                const ingredientsRaw = columns[1];
                
                if (name && ingredientsRaw && name.toLowerCase() !== 'name') {
                    recipeDatabase[name] = ingredientsRaw.split('\n')
                                                        .map(i => i.replace(/[\r\t]/g, '').trim())
                                                        .filter(i => i.length > 0);
                }
            });

            // Combine all unique keys into one single alphabetized list
            const allMeals = Object.keys(recipeDatabase);
            const allMaterials = Object.values(materialDatabase).map(m => m.name);
            
            // Deduplicate items that appear in multiple lists
            const masterSet = new Set([...allMeals, ...allMaterials]);
            masterItemCatalog = Array.from(masterSet).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));

            renderDropdown(masterItemCatalog);

            searchBar.disabled = false;
            masterSelect.disabled = false;
            statusMsg.textContent = `All directories synthesized! Search bar active across ${masterItemCatalog.length} unique items.`;
            statusMsg.style.color = '#28a745';

        } catch (err) {
            statusMsg.textContent = `Sync Error: ${err.message}`;
            statusMsg.style.color = '#dc3545';
        }
    }

    function renderDropdown(list) {
        masterSelect.innerHTML = '';
        const defaultOpt = document.createElement('option');
        defaultOpt.value = "";
        defaultOpt.textContent = `-- Select from ${list.length} Matches --`;
        masterSelect.appendChild(defaultOpt);

        list.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item;
            opt.textContent = item;
            masterSelect.appendChild(opt);
        });
    }

    function generateInfoCardHtml(itemObj) {
        if (itemObj.type === 'fish') {
            return `<div class="info-card fish"><strong>🎣 Ripple:</strong> ${itemObj.field1} | <strong>📍 Locations:</strong> ${itemObj.field2}</div>`;
        } else if (itemObj.type === 'gem') {
            return `<div class="info-card gem"><strong>💎 Location:</strong> ${itemObj.field1}</div>`;
        } else if (itemObj.type === 'flower') {
            return `<div class="info-card flower"><strong>🌸 Locations:</strong> ${itemObj.field1} | <strong>🔢 Max Spawns:</strong> ${itemObj.field2}</div>`;
        } else if (itemObj.type === 'resource') {
            return `<div class="info-card resource"><strong>📦 Source:</strong> ${itemObj.field1}</div>`;
        } else if (itemObj.type === 'crafting') {
            return `<div class="info-card crafting"><strong>🛠️ Crafting Source:</strong> ${itemObj.field1}</div>`;
        }
        return '';
    }

    searchBar.addEventListener('input', () => {
        const query = searchBar.value.toLowerCase();
        const filteredList = masterItemCatalog.filter(name => name.toLowerCase().includes(query));
        renderDropdown(filteredList);
    });

    masterSelect.addEventListener('change', () => {
        const selection = masterSelect.value;
        resultBox.style.display = 'none';
        resultContent.innerHTML = '';

        if (!selection) return;

        resultTitle.textContent = selection;
        const lowerSelection = selection.toLowerCase();
        
        let htmlBuilder = '';
        let matchedTypeStrings = [];

        // CASE A: The selected item is a MEAL recipe
        if (recipeDatabase[selection]) {
            matchedTypeStrings.push("Meal Recipe");
            htmlBuilder += `<div class="section-heading">Ingredients Required</div><ul class="ingredient-list">`;
            
            recipeDatabase[selection].forEach(ingredient => {
                htmlBuilder += `<li>${ingredient}`;
                // Cross-reference ingredient metadata automatically
                const cleanIngKey = ingredient.toLowerCase();
                if (materialDatabase[cleanIngKey]) {
                    htmlBuilder += generateInfoCardHtml(materialDatabase[cleanIngKey]);
                }
                htmlBuilder += `</li>`;
            });
            htmlBuilder += `</ul>`;
        }

        // CASE B: The selected item is a MATERIAL/INGREDIENT directly
        if (materialDatabase[lowerSelection]) {
            const mat = materialDatabase[lowerSelection];
            matchedTypeStrings.push(`${mat.type} entry`);
            
            htmlBuilder += `<div class="section-heading">Source Information</div>`;
            htmlBuilder += generateInfoCardHtml(mat);

            // Reverse Lookup: Search all recipes to find where this material is used
            let usageMeals = [];
            Object.keys(recipeDatabase).forEach(mealName => {
                const usesIt = recipeDatabase[mealName].some(ing => ing.toLowerCase() === lowerSelection);
                if (usesIt) usageMeals.push(mealName);
            });

            if (usageMeals.length > 0) {
                htmlBuilder += `<div class="section-heading">Used In Recipes (${usageMeals.length})</div><ul class="usage-list">`;
                usageMeals.sort().forEach(meal => {
                    htmlBuilder += `<li><strong>${meal}</strong></li>`;
                });
                htmlBuilder += `</ul>`;
            }
        }

        resultType.textContent = matchedTypeStrings.join(" / ");
        resultContent.innerHTML = htmlBuilder;
        resultBox.style.display = 'block';
    });

    loadAllDatabases();
</script>

</body>
</html>
